name: imposter_kerala_edition
description: "Imposter - Kerala Edition. An offline party game for Malayalam-speaking users."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Navigation
  go_router: ^15.1.2

  # Dependency Injection
  get_it: ^8.0.3

  # Local Storage
  hive_flutter: ^1.1.0

  # Animations
  flutter_animate: ^4.5.2
  confetti: ^0.8.0

  # Haptics
  vibration: ^2.0.1

  # Typography
  google_fonts: ^6.2.1

  # Utils
  uuid: ^4.5.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - assets/

  fonts:
    - family: Exo2
      fonts:
        - asset: assets/fonts/Exo2-Regular.ttf
          weight: 400
        - asset: assets/fonts/Exo2-Medium.ttf
          weight: 500
        - asset: assets/fonts/Exo2-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Exo2-Bold.ttf
          weight: 700
        - asset: assets/fonts/Exo2-ExtraBold.ttf
          weight: 800
